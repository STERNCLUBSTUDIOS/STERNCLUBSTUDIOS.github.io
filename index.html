<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STERN CLUB STUDIOS</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');

body{
    margin:0;
    padding:0;
    height:100vh;

    background-image:url('fondo.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    position:relative;
}

#contador{
    position:absolute;
    top:77%;
    left:50%;

    transform:translate(-50%,-50%);

    font-family:'Oswald', sans-serif;
    font-size:36px;
    font-weight:500;

    color:#444444;

    text-align:center;
}

</style>

</head>

<body>

<div id="contador">0</div>

<script>

/* =====================================
   CODIGO DE LA GORRA
   CAMBIALO AQUI CUANDO HAGAS OTRA
===================================== */

const codigoGorra = "A7K9M2P4X8Q1";

/* ===================================== */

localStorage.removeItem(codigoGorra); // Borra el contador previo

let contador = localStorage.getItem(codigoGorra);

if (contador === null) {
    contador = 0;
} else {
    contador = parseInt(contador);
}

contador++;

localStorage.setItem(codigoGorra, contador);

document.getElementById("contador").innerText = contador;

</script>

</body>
</html>
