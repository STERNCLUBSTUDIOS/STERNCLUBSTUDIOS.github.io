<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STERN CLUB STUDIOS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        #contador {
            position: absolute;
            top: 77%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 36px;
            font-weight: 500;
            color: #444444;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="contador">0</div>

    <script>
        // Función para obtener el parámetro 'codigo' de la URL
        function obtenerCodigoDesdeURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('codigo');
        }

        const codigoGorra = obtenerCodigoDesdeURL();

        if (!codigoGorra) {
            document.getElementById("contador").innerText = "Código no proporcionado";
        } else {

            const SUPABASE_URL = "https://vbgyrfgeyrqcphnuspdb.supabase.co/rest/v1";
            const SUPABASE_KEY = "sb_publishable_JFfDRaXIJ2zsre2rPJ_9Vw_1VCM9HEN";

            async function actualizarContador() {
                try {
                    const respuesta = await fetch(
                        `${SUPABASE_URL}/CHIPSGORRAS?IDGORRA=eq.${codigoGorra}&select=*`,
                        {
                            headers: {
                                "apikey": SUPABASE_KEY,
                                "Authorization": `Bearer ${SUPABASE_KEY}`
                            }
                        }
                    );

                    const datos = await respuesta.json();

                    if (!datos.length) {
                        document.getElementById("contador").innerText = "No existe";
                        return;
                    }

                    let contadorActual = parseInt(datos[0].CONTADOR || 0);
                    contadorActual++;

                    await fetch(
                        `${SUPABASE_URL}/CHIPSGORRAS?IDGORRA=eq.${codigoGorra}`,
                        {
                            method: "PATCH",
                            headers: {
                                "apikey": SUPABASE_KEY,
                                "Authorization": `Bearer ${SUPABASE_KEY}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                CONTADOR: contadorActual
                            })
                        }
                    );

                    document.getElementById("contador").innerText = contadorActual;

                } catch (error) {
                    console.error(error);
                    document.getElementById("contador").innerText = "Error";
                }
            }

            actualizarContador();
        }

    </script>

</body>
</html>
