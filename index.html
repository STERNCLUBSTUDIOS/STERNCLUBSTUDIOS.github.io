<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STERN CLUB STUDIOS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    #texto-titulo {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      font-weight: bold;
      color: #444444;
      text-align: center;
    }

    #contador {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px; /* Tamaño ajustado */
      font-weight: bold;
      color: #444444;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #codigo {
      display: block;
      margin-top: 10px;
      text-align: center;
      font-size: 18px;
      color: #444444;
    }
  </style>
</head>
<body>
  <div id="texto-titulo">TU PRODUCTO ES 100% AUTÉNTICO</div>
  <div id="contador">0</div>
  <div id="codigo">A7K9-M2P4-X8Q1</div>

  <script>
    // Incremento del contador con localStorage
    let contador = localStorage.getItem("contador");
    if (!contador) {
      contador = 0;
    }
    contador++;
    localStorage.setItem("contador", contador);
    document.getElementById("contador").innerText = contador;
  </script>
</body>
</html>
