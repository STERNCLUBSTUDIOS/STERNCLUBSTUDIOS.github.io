<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STERN CLUB STUDIOS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400&display=swap');

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      font-family: Arial, sans-serif; /* Deja todo lo demás en Arial */
    }

    #texto-titulo {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 39.3px;
      font-weight: bold;
      color: #444444;
      text-align: center;
    }

    #contador {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 39.3px; /* Igual que las letras */
      font-weight: bold;
      color: #444444;
      font-family: 'Oswald', sans-serif; /* Solo el contador usa Oswald */
      text-align: center;
    }

    #codigo {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #444444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="texto-titulo">TU PRODUCTO ES 100% AUTÉNTICO</div>
  <div id="contador">0</div>
  <div id="codigo">X9B3-D1FG-7ZQ4</div>

  <script>
    // Incremento del contador con localStorage
    let contador = localStorage.getItem("contador");
    if (!contador) {
      contador = 0;
    }
    contador++;
    localStorage.setItem("contador", contador);
    document.getElementById("contador").innerText = contador;
  </script>
</body>
</html>
